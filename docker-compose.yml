# A4 local stack: Postgres + Redis + FastAPI + Celery worker + Next.js.
# Audits are enqueued by the API and processed by the worker (async); the
# frontend polls until each audit is done.
#
# Usage:
#   docker compose up --build
#   open http://localhost:3000  → enter a URL → download the branded PDF.

services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=geo
      - POSTGRES_PASSWORD=geo
      - POSTGRES_DB=geo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    # Apply migrations, then serve. (Image CMD does the same; spelled out here
    # so it's visible and waits on the DB being ready.)
    command: sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://geo:geo@db:5432/geo
      - CORS_ORIGINS=http://localhost:3000
      - ARTIFACTS_DIR=/data/artifacts
      - ENABLE_JS_RENDER=true
      # Queue (A4): enqueue to Redis; the worker processes audits.
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
      # Real Core Web Vitals (A5). Set PAGESPEED_API_KEY to enable.
      - PAGESPEED_API_KEY=${PAGESPEED_API_KEY:-}
      - PSI_STRATEGY=${PSI_STRATEGY:-mobile}
      # Auth (A3). Override these for any non-local deployment.
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-local-dev-secret-change-me-0123456789abcd}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@growity.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
    volumes:
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://geo:geo@db:5432/geo
      - ARTIFACTS_DIR=/data/artifacts
      - ENABLE_JS_RENDER=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
      - PAGESPEED_API_KEY=${PAGESPEED_API_KEY:-}
      - PSI_STRATEGY=${PSI_STRATEGY:-mobile}
    volumes:
      # Shared with the API so it can serve the PDFs/HTML the worker writes.
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Browser-side calls hit the API on the host's published port.
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  artifacts:
  pgdata:
